name: dify-niro

services:
  api:
    build:
      context: ../..
      dockerfile: api/Dockerfile
      args:
        COMMIT_SHA: ${NIRO_COMMIT_SHA:-unknown}
    image: dify-niro-api:${NIRO_IMAGE_TAG:-local}
    env_file: ./dify.env
    environment:
      MODE: api
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started
      sandbox:
        condition: service_healthy
      plugin_daemon:
        condition: service_started
    ports:
      - "0.0.0.0:${NIRO_API_PORT:-5001}:5001"
    volumes:
      - ./run/app/storage:/app/api/storage
      - .:/niro-harness:ro
      - ..:/niro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  worker:
    image: dify-niro-api:${NIRO_IMAGE_TAG:-local}
    env_file: ./dify.env
    environment:
      MODE: worker
      CELERY_WORKER_AMOUNT: 1
    depends_on:
      api:
        condition: service_healthy
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./run/app/storage:/app/api/storage
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_healthcheck.celery inspect ping"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s

  worker_beat:
    image: dify-niro-api:${NIRO_IMAGE_TAG:-local}
    env_file: ./dify.env
    environment:
      MODE: beat
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./run/app/storage:/app/api/storage

  web:
    build:
      context: ../..
      dockerfile: web/Dockerfile
      args:
        COMMIT_SHA: ${NIRO_COMMIT_SHA:-unknown}
    image: dify-niro-web:${NIRO_IMAGE_TAG:-local}
    env_file: ./dify.env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "0.0.0.0:${NIRO_WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null \"http://$(hostname -i | awk '{print $1}'):3000\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  db_postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: difyai123456
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres -c max_connections=200
               -c shared_buffers=128MB
               -c statement_timeout=0
    volumes:
      - ./run/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres", "-d", "dify"]
      interval: 1s
      timeout: 3s
      retries: 90

  redis:
    image: redis:6-alpine
    command: redis-server --requirepass difyai123456
    environment:
      REDISCLI_AUTH: difyai123456
    volumes:
      - ./run/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a difyai123456 ping | grep -q PONG"]
      interval: 1s
      timeout: 3s
      retries: 60

  weaviate:
    image: semitechnologies/weaviate:1.27.0
    volumes:
      - ./run/weaviate:/var/lib/weaviate
    environment:
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih
      AUTHENTICATION_APIKEY_USERS: hello@dify.ai
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: hello@dify.ai

  sandbox:
    image: langgenius/dify-sandbox:0.2.15
    environment:
      API_KEY: dify-sandbox
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://ssrf_proxy:3128
      HTTPS_PROXY: http://ssrf_proxy:3128
      SANDBOX_PORT: 8194
    volumes:
      - ./run/sandbox/dependencies:/dependencies
      - ./sandbox-config.yaml:/conf/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 5s
      timeout: 5s
      retries: 24

  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.6.3-local
    env_file: ./dify.env
    environment:
      DB_DATABASE: dify_plugin
      DB_SSL_MODE: disable
      SERVER_PORT: 5002
      SERVER_KEY: local-niro-plugin-daemon-key
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: local-niro-plugin-inner-api-key
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      FORCE_VERIFYING_SIGNATURE: "false"
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
    depends_on:
      db_postgres:
        condition: service_healthy
    volumes:
      - ./run/plugin_daemon:/app/storage

  ssrf_proxy:
    image: ubuntu/squid:latest
    volumes:
      - ../../docker/ssrf_proxy/squid.conf.template:/etc/squid/squid.conf.template:ro
      - ../../docker/ssrf_proxy/docker-entrypoint.sh:/docker-entrypoint-mount.sh:ro
    entrypoint:
      - sh
      - -c
      - "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh"
    environment:
      HTTP_PORT: 3128
      COREDUMP_DIR: /var/spool/squid
